<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MycoTanji - 影片縮圖設計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { emerald: '#10b981', amber: '#fbbf24', dark: '#0f172a', blue: '#3b82f6' }
                    },
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        poppins: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1e293b;
        }
        .thumbnail-container {
            width: 1280px;
            height: 720px;
            background-color: #0f172a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: top left;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .perspective-wrapper {
            perspective: 2000px;
        }
        .isometric-ui {
            transform: rotateY(-15deg) rotateX(10deg) rotateZ(2deg);
            transform-style: preserve-3d;
        }
        .glow-blob-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }
        .glow-blob-2 {
            position: absolute;
            bottom: -200px;
            right: -100px;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%);
            background-size: 60px 60px, 100% 8px;
            z-index: 0;
            opacity: 0.8;
        }
        .export-mode * {
            animation: none !important;
            transition: none !important;
        }
        .export-mode .text-transparent {
            background: none !important;
            -webkit-text-fill-color: #10b981 !important; 
            color: #10b981 !important;
        }
        @media (max-width: 1350px) {
            .thumbnail-container { transform: scale(0.8); }
        }
        @media (max-width: 1100px) {
            .thumbnail-container { transform: scale(0.6); }
        }
        @media (max-width: 800px) {
            .thumbnail-container { transform: scale(0.4); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <button id="download-btn" class="fixed top-4 left-4 bg-brand-emerald hover:bg-emerald-400 text-slate-900 font-bold py-3 px-6 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.5)] z-50 flex items-center gap-3 transition-all duration-300 transform hover:-translate-y-1 outline-none">
        <i class="fa-solid fa-download text-xl"></i>
        <span>下載高品質縮圖 (JPG)</span>
    </button>

    <div class="thumbnail-container flex items-center" id="thumbnail-canvas">
        <div class="glow-blob-1"></div>
        <div class="glow-blob-2"></div>
        <div class="grid-bg"></div>

        <div class="w-[45%] pl-16 relative z-20 flex flex-col justify-center h-full">
            
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-brand-emerald to-emerald-700 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-lg shadow-brand-emerald/30 border-2 border-emerald-300">
                    <i class="fa-solid fa-network-wired"></i>
                </div>
                <span class="font-black text-5xl tracking-tight text-white font-poppins whitespace-nowrap">Myco<span class="text-brand-emerald">Tanji</span></span>
            </div>

            <div class="inline-block bg-brand-emerald/10 border-2 border-brand-emerald/50 text-brand-emerald font-bold px-5 py-2 rounded-full text-lg mb-6 w-max backdrop-blur-sm tracking-widest whitespace-nowrap">
                2026 台灣仿生設計競賽
            </div>

            <h1 class="text-6xl font-black text-white leading-[1.25] mb-6 tracking-wide whitespace-nowrap" style="text-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                大自然的智慧，<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-brand-emerald" style="text-shadow: none;">重塑社區資源循環</span>
            </h1>

            <p class="text-2xl text-slate-300 font-bold border-l-4 border-brand-emerald pl-5 mt-4 tracking-widest whitespace-nowrap">
                仿生網絡 ✕ 數位監測 ✕ 可食地景
            </p>
        </div>

        <div class="w-[55%] relative z-10 perspective-wrapper pr-12">
            <div class="isometric-ui w-full relative">
                
                <div class="glass-panel rounded-3xl p-8 w-full max-w-[760px] ml-auto relative">
                    
                    <div class="flex gap-2 mb-6">
                        <div class="w-4 h-4 rounded-full bg-slate-600"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-500"></div>
                        <div class="w-4 h-4 rounded-full bg-brand-emerald animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                    </div>

                    <div class="flex gap-4 mb-8">
                        <div class="flex-grow relative">
                            <i class="fa-solid fa-leaf absolute left-5 top-1/2 transform -translate-y-1/2 text-emerald-500 text-xl"></i>
                            <div class="w-full bg-slate-900 border-2 border-slate-600 rounded-xl py-4 pl-12 pr-5 text-white text-xl flex items-center font-bold tracking-widest whitespace-nowrap">
                                麗寶萊茵 Living Lab
                                <div class="ml-auto flex items-center gap-3">
                                    <span class="text-base text-slate-400 font-mono">SYNC.ONLINE</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gradient-to-r from-brand-emerald to-emerald-600 text-white font-black py-4 px-8 rounded-xl shadow-lg shadow-brand-emerald/40 text-xl flex items-center tracking-widest whitespace-nowrap">
                            啟動循環 <i class="fa-solid fa-arrows-rotate fa-spin ml-3"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mb-8">
                        
                        <div class="bg-slate-800 border-2 border-red-500/50 p-5 rounded-2xl flex flex-col gap-3 transform translate-z-10 shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-red-500/10 text-8xl"><i class="fa-solid fa-fire"></i></div>
                            <div class="flex items-center gap-4 relative z-10">
                                <div class="bg-slate-900 border-2 border-red-500 p-3 rounded-xl text-red-400 text-2xl shadow-[0_0_15px_rgba(239,68,68,0.3)]"><i class="fa-solid fa-temperature-arrow-up"></i></div>
                                <div>
                                    <h4 class="font-black text-white text-xl tracking-widest whitespace-nowrap">高溫發酵轉化</h4>
                                    <p class="text-red-400 font-bold text-xs tracking-widest mt-1 font-poppins whitespace-nowrap">PHASE 02 ACTIVE</p>
                                </div>
                            </div>
                            <div class="relative z-10 mt-2">
                                <div class="flex justify-between text-xs text-slate-400 mb-1 font-bold font-poppins"><span>TEMP</span><span>60°C</span></div>
                                <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-amber-500 to-red-500 w-[85%]"></div></div>
                            </div>
                        </div>

                        <div class="bg-slate-800 border-2 border-amber-600/50 p-5 rounded-2xl flex flex-col gap-3 transform translate-z-10 shadow-2xl relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 text-amber-500/10 text-8xl"><i class="fa-solid fa-seedling"></i></div>
                            <div class="flex items-center gap-4 relative z-10">
                                <div class="bg-slate-900 border-2 border-amber-500 p-3 rounded-xl text-amber-400 text-2xl shadow-[0_0_15px_rgba(245,158,11,0.3)]"><i class="fa-solid fa-seedling"></i></div>
                                <div>
                                    <h4 class="font-black text-white text-xl tracking-widest whitespace-nowrap">有機黑金沃土</h4>
                                    <p class="text-amber-400 font-bold text-xs tracking-widest mt-1 font-poppins whitespace-nowrap">PHASE 03 READY</p>
                                </div>
                            </div>
                            <div class="relative z-10 mt-2">
                                <div class="flex justify-between text-xs text-slate-400 mb-1 font-bold font-poppins"><span>CONVERSION</span><span>0.7x</span></div>
                                <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden"><div class="h-full bg-amber-500 w-[70%]"></div></div>
                            </div>
                        </div>

                    </div>

                    <div class="bg-slate-900 border-2 border-slate-700 rounded-2xl p-5 flex justify-around items-center h-[140px]">
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-mug-hot"></i></div></div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-leaf"></i></div></div>
                        <div class="flex flex-col items-center gap-3 relative">
                            <div class="absolute inset-0 bg-brand-emerald rounded-full blur-xl opacity-30"></div>
                            <div class="w-16 h-16 rounded-full border-4 border-brand-emerald bg-slate-800 flex items-center justify-center text-2xl text-brand-emerald shadow-[0_0_20px_rgba(16,185,129,0.5)] z-10"><i class="fa-solid fa-chart-pie"></i></div>
                        </div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-recycle"></i></div></div>
                        <div class="flex flex-col items-center gap-3 opacity-50"><div class="w-14 h-14 rounded-full border-2 border-slate-500 flex items-center justify-center text-xl text-slate-400"><i class="fa-solid fa-tree"></i></div></div>
                    </div>

                </div>

                <div class="absolute -bottom-8 -left-16 bg-slate-900 rounded-2xl p-4 shadow-2xl flex items-center gap-4 transform translate-z-20 border-4 border-brand-emerald shadow-[0_20px_40px_rgba(0,0,0,0.8)]">
                    <div class="w-14 h-14 rounded-full bg-brand-emerald/20 border-2 border-brand-emerald flex items-center justify-center text-brand-emerald text-2xl">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div>
                        <div class="text-xs text-slate-400 font-bold mb-1 tracking-widest whitespace-nowrap font-poppins">REAL-TIME DASHBOARD</div>
                        <div class="text-xl font-black text-white tracking-widest whitespace-nowrap">社區碳循環數據監測啟動</div>
                    </div>
                    <div class="text-brand-emerald text-3xl ml-3 animate-pulse"><i class="fa-solid fa-circle-check"></i></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('download-btn').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            const target = document.getElementById('thumbnail-canvas');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i><span>處理中...</span>';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';

            const originalTransform = target.style.transform;
            target.style.transform = 'scale(1)';
            target.classList.add('export-mode');

            document.fonts.ready.then(() => {
                setTimeout(() => {
                    html2canvas(target, {
                        width: 1280,
                        height: 720,
                        scale: 1, 
                        backgroundColor: '#0f172a',
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = 'MycoTanji_影片縮圖.jpg';
                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                        link.click();
                        
                        target.style.transform = originalTransform;
                        target.classList.remove('export-mode');
                        btn.innerHTML = originalText;
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                    }).catch(err => {
                        target.style.transform = originalTransform;
                        target.classList.remove('export-mode');
                        btn.innerHTML = originalText;
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                    });
                }, 500);
            });
        });
    </script>
</body>
</html>
